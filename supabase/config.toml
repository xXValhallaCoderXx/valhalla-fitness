project_id = "sheetless"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Local Google OAuth for dev. The CLI resolves env() from the SHELL, not from .env — so export
# SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID/_SECRET before `supabase start`, e.g.:
#   set -a; . ./.env; set +a; supabase stop && supabase start
# Local callback (add to the Google client's redirect URIs): http://127.0.0.1:54321/auth/v1/callback
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
